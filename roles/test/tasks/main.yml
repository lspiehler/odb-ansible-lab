- name: Group of tasks
  when: ansible_os_family == "RedHat"
  block:
    - name: Create directory if it does not exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ test_dirs }}"
      notify: Restart Syslog
