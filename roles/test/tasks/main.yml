- name: Group of tasks
  when: ansible_os_family == "RedHat"
  block:
    - name: Create directory if it does not exist
      ansible.builtin.include_tasks:
        file: create_directories.yml
      tags:
        - dirs

    - name: Write template file
      ansible.builtin.include_tasks:
        file: write_template_file.yml
      tags:
        - files
