- name: Group of tasks
  when: ansible_os_family == "RedHat"
  block:
    - name: Create directory if it does not exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ dir }}"
      # notify: Restart Syslog
      # notify: "{{ handler_name }}"

    - name: Write template file
      ansible.builtin.template:
        src: example.j2
        mode: '0644'
        dest: /tmp/example.txt
      # notify: Restart Syslog
      # notify: "{{ handler_name }}"

